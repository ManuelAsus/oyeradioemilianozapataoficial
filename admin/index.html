<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso Admin · Oye 99.9</title>
  <link rel="icon" href="../assets/img/XHEM-Oye99.9-Backgraound.png" type="image/x-icon" />
  <!-- Google Fonts (misma que el sitio público) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <!-- Remix Icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
  <!-- Estilos propios del login -->
  <link rel="stylesheet" href="css/admin-login.css" />
</head>
<body>

  <div class="login-container">
    <div class="login-card glass-card">
      <!-- Logo -->
      <div class="login-logo">
        <img src="../assets/img/XHEM-Oye99.9-Backgraound.png" alt="Oye 99.9" />
      </div>
      <h1 class="login-title">Panel de Control</h1>
      <p class="login-subtitle">Accede con tus credenciales</p>

      <form id="loginForm" class="login-form" autocomplete="off">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <div class="input-wrapper">
            <i class="ri-mail-line"></i>
            <input type="email" id="email" placeholder="admin@oye999.fm" required />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <i class="ri-lock-line"></i>
            <input type="password" id="password" placeholder="••••••••" required />
            <button type="button" id="togglePassword" class="toggle-pwd" aria-label="Mostrar contraseña">
              <i class="ri-eye-line"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn--primary btn--block" id="loginBtn">
          <span id="btnText">Iniciar sesión</span>
          <div id="btnSpinner" class="spinner" style="display: none;"></div>
        </button>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
      </form>

      <div class="login-footer">
        <span>¿Olvidaste tu contraseña?</span>
        <a href="#">Recupérala aquí</a>
      </div>
    </div>

    <div class="login-bg-glow"></div>
  </div>

  <!-- Scripts -->
  <script type="module" src="js/admin-auth.js"></script>
</body>
</html>
